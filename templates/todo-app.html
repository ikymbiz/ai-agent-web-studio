<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f0f2f5; min-height: 100vh; }

        .app { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .app-header { text-align: center; margin-bottom: 40px; }
        .app-header h1 { font-size: 32px; color: #1a1a2e; margin-bottom: 8px; }
        .app-header p { color: #888; }

        .input-area { display: flex; gap: 12px; margin-bottom: 24px; }
        .input-area input { flex: 1; padding: 16px 20px; border-radius: 16px; border: 2px solid #e0e0e0; font-size: 16px; outline: none; background: #fff; transition: border 0.2s; }
        .input-area input:focus { border-color: #4361ee; }
        .input-area button { padding: 16px 28px; border-radius: 16px; background: #4361ee; color: #fff; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .input-area button:hover { background: #3651d4; transform: translateY(-2px); }

        .filters { display: flex; gap: 8px; margin-bottom: 20px; }
        .filter-btn { padding: 8px 18px; border-radius: 999px; border: none; background: #fff; color: #666; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid #e0e0e0; }
        .filter-btn.active { background: #4361ee; color: #fff; border-color: #4361ee; }
        .filter-btn:hover:not(.active) { background: #f0f4ff; color: #4361ee; border-color: #4361ee; }

        .stats { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: #fff; border-radius: 16px; margin-bottom: 16px; font-size: 14px; color: #888; }
        .stats strong { color: #4361ee; }
        .clear-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 13px; font-weight: 600; }
        .clear-btn:hover { text-decoration: underline; }

        .todo-list { display: flex; flex-direction: column; gap: 8px; }
        .todo-item { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: #fff; border-radius: 16px; transition: all 0.2s; border: 1px solid transparent; }
        .todo-item:hover { border-color: #e0e0e0; }
        .todo-item.done { opacity: 0.5; }
        .todo-item.done .todo-text { text-decoration: line-through; }

        .todo-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #d0d0d0; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 14px; background: #fff; }
        .todo-item.done .todo-check { background: #4361ee; border-color: #4361ee; color: #fff; }
        .todo-text { flex: 1; font-size: 16px; color: #333; }
        .todo-delete { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; color: #ccc; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .todo-delete:hover { background: #fef2f2; color: #ef4444; }

        .empty { text-align: center; padding: 60px 20px; color: #bbb; }
        .empty span { font-size: 48px; display: block; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="app-header">
            <h1>✅ My ToDo</h1>
            <p>タスクを管理してすっきり整理しよう</p>
        </div>

        <div class="input-area">
            <input type="text" id="todo-input" placeholder="新しいタスクを入力..." onkeypress="if(event.key==='Enter')addTodo()">
            <button onclick="addTodo()">追加</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
            <button class="filter-btn" onclick="setFilter('active', this)">未完了</button>
            <button class="filter-btn" onclick="setFilter('done', this)">完了</button>
        </div>

        <div class="stats">
            <span><strong id="active-count">0</strong> 件の未完了タスク</span>
            <button class="clear-btn" onclick="clearDone()">完了済みを削除</button>
        </div>

        <div class="todo-list" id="todo-list"></div>
    </div>

    <script>
        let todos = JSON.parse(localStorage.getItem('todos') || '[]');
        let filter = 'all';

        function save() { localStorage.setItem('todos', JSON.stringify(todos)); }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if (!text) return;
            todos.unshift({ id: Date.now(), text, done: false });
            input.value = '';
            save(); render();
        }

        function toggleTodo(id) {
            const t = todos.find(t => t.id === id);
            if (t) t.done = !t.done;
            save(); render();
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            save(); render();
        }

        function clearDone() {
            todos = todos.filter(t => !t.done);
            save(); render();
        }

        function setFilter(f, btn) {
            filter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const list = document.getElementById('todo-list');
            const filtered = todos.filter(t => filter === 'all' ? true : filter === 'done' ? t.done : !t.done);
            document.getElementById('active-count').textContent = todos.filter(t => !t.done).length;

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty"><span>📋</span>タスクがありません</div>';
                return;
            }

            list.innerHTML = filtered.map(t => `
                <div class="todo-item ${t.done ? 'done' : ''}">
                    <div class="todo-check" onclick="toggleTodo(${t.id})">${t.done ? '✓' : ''}</div>
                    <span class="todo-text">${t.text}</span>
                    <button class="todo-delete" onclick="deleteTodo(${t.id})">×</button>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
